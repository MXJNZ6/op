name: Build OpenWrt_X86_imm

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
   - cron: 0 23 5 * *

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: v23.05.4
  CONFIG_FILE: X86_imm.config
  DIY_SH: diy-imm.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FILE_NAME: X86
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    
    steps:
    - name: Checkout OpenWrt
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* snap*
        sudo -E apt -y full-upgrade
        sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean
        sudo -E timedatectl set-timezone "Asia/Shanghai"
        sudo mkdir -p /mnt/workdir
        sudo chown $USER:$GROUPS /mnt/workdir
        echo "status=success" >> ${GITHUB_OUTPUT}
        df -Th

    - name: 下载固件源码
      working-directory: /mnt/workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        useVersionInfo=$(git show -s --date=short --format="%0AAuthor: %an%0Adate: %cd%0Acommit: %s%0Acommit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date "+%Y-%m-%d")" >> $GITHUB_ENV

    - name: 加载自定义设置和调整配置
      run: |
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH
        cd -
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config

    - name: 下载包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo "::notice::开始编译（线程数: $(nproc))"
        make -j$(nproc) || make -j1 || make -j1 V=s || {
          echo "::error::编译失败"
          exit 1
        }
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
    
    - name: Clean up server space
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/
        rm -rf $(ls . | grep -v "^bin$" | xargs) 2>/dev/null
        df -hT ${PWD}

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        TARGET_DIR=$(find "$GITHUB_WORKSPACE/openwrt/bin/targets" -type f -name "*.img.gz" -exec dirname {} \; | uniq)
        [ -z "$TARGET_DIR" ] && { 
          echo "::error::错误：找不到固件文件(*.img.gz)";
          echo "调试信息：";
          ls -R "$GITHUB_WORKSPACE/openwrt/bin";
          exit 1;
        }
        
        cd "$TARGET_DIR" || exit 1
        echo "固件目录路径：$PWD"
        CONFIG_FILE_NAME="${FILE_NAME}_config_${DATE1}.config"
        [ -f "$GITHUB_WORKSPACE/openwrt/.config" ] && cp "$GITHUB_WORKSPACE/openwrt/.config" "$CONFIG_FILE_NAME"
        
        echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV
        echo "CONFIG_FILE=$CONFIG_FILE_NAME" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
        echo "::group::固件目录内容（仅文件）"
        find . -maxdepth 1 -type f -ls
        echo "::endgroup::"

    - name: Collect release files
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
        RELEASE_DIR="$GITHUB_WORKSPACE/release_files"
        mkdir -p "$RELEASE_DIR"
        find "${{ env.FIRMWARE_DIR }}" -maxdepth 1 -type f -exec cp -v {} "$RELEASE_DIR/" \;
        echo "RELEASE_FILES=$RELEASE_DIR/*" >> $GITHUB_ENV
        echo "::group::最终发布文件"
        ls -lh "$RELEASE_DIR"
        echo "::endgroup::"

    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_${{ env.FILE_NAME }}_full_${{ env.DATE1 }}
        path: |
          ${{ env.RELEASE_FILES }}
        retention-days: 7

    - name: Create or Update release
      id: release
      uses: ncipollo/release-action@v1
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: "immortalwrt ${{ env.FILE_NAME }} Latest"
        tag: "immortalwrt-latest"
        allowUpdates: true
        commit: master
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          OpenWrt ${{ env.FILE_NAME }} 最新编译版本
          📅 编译时间: ${{ env.DATE }}
          🔧 配置文件: ${{ env.CONFIG_FILE }}
          📦 文件信息:
          - 固件镜像 (*.img.gz)
          - 配置文件 (.config)
        artifacts: ${{ env.RELEASE_FILES }}
        artifactErrorsFailBuild: false
        replacesArtifacts: true
        
    - name: TG notification
      if: success()
      run: |
        curl -sSf -X POST \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="🛠️ OpenWrt 编译成功！%0A%0A▫️ 版本: immortalwrt_${{ env.FILE_NAME }}%0A▫️ 时间: ${{ env.DATE }}%0A▫️ 下载: https://github.com/${{ github.repository }}/releases/tag/immortalwrt-latest"
